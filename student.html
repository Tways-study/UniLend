<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniLend &mdash; Student Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --red: #b91c1c;
        --red-dark: #7f1d1d;
        --gold: #d97706;
        --gold-light: #f59e0b;
        --gold-pale: #fef3c7;
        --bg: #faf7f5;
      }
      * {
        box-sizing: border-box;
      }
      body {
        background-color: var(--bg);
        color: #1f2937;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 0.9375rem;
      }
      .navbar-student {
        background: linear-gradient(
          90deg,
          var(--red-dark) 0%,
          var(--red) 60%,
          #92400e 100%
        );
        box-shadow: 0 2px 16px rgba(127, 29, 29, 0.4);
        padding: 0.65rem 0;
      }
      .navbar-brand {
        font-size: 1.2rem;
        font-weight: 800;
        color: var(--gold-light) !important;
        letter-spacing: -0.3px;
      }
      .gold-bar {
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--gold) 0%,
          var(--gold-light) 40%,
          rgba(245, 158, 11, 0.2) 100%
        );
      }
      .nav-label {
        color: rgba(255, 255, 255, 0.6) !important;
        font-size: 0.85rem;
      }
      .btn-logout {
        border: 1.5px solid rgba(245, 158, 11, 0.45);
        color: var(--gold-light);
        font-size: 0.8rem;
        font-weight: 600;
        border-radius: 7px;
        padding: 0.35rem 0.9rem;
        background: transparent;
        transition: all 0.2s ease;
      }
      .btn-logout:hover {
        background: rgba(245, 158, 11, 0.15);
        border-color: var(--gold-light);
        color: var(--gold-light);
      }
      main {
        animation: pageIn 0.4s ease both;
      }
      @keyframes pageIn {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .section-heading {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--red-dark);
      }
      .heading-icon {
        width: 38px;
        height: 38px;
        border-radius: 9px;
        background: linear-gradient(
          135deg,
          var(--red) 0%,
          var(--red-dark) 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--gold-light);
        font-size: 1rem;
        flex-shrink: 0;
        box-shadow: 0 4px 10px rgba(185, 28, 28, 0.28);
      }
      /* Equipment cards */
      .equipment-img-placeholder {
        height: 160px;
        background: linear-gradient(135deg, #fdf2f2 0%, var(--gold-pale) 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--red);
        font-size: 3rem;
        transition: background 0.25s ease;
      }
      .card {
        border: 1px solid rgba(0, 0, 0, 0.055) !important;
        border-radius: 1rem !important;
        transition:
          transform 0.22s ease,
          box-shadow 0.22s ease;
      }
      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 28px rgba(127, 29, 29, 0.13) !important;
      }
      .card:hover .equipment-img-placeholder {
        background: linear-gradient(135deg, #fde8e8 0%, #fef3c7 100%);
      }
      /* Requests table */
      .panel-card {
        background: #fff;
        border: 1px solid rgba(0, 0, 0, 0.055);
        border-radius: 1rem;
        box-shadow: 0 2px 14px rgba(0, 0, 0, 0.055);
        overflow: hidden;
      }
      .table {
        margin-bottom: 0;
        font-size: 0.875rem;
      }
      .table thead th {
        background: linear-gradient(90deg, var(--red-dark) 0%, var(--red) 100%);
        color: rgba(255, 255, 255, 0.88);
        font-weight: 600;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        border: none;
        padding: 0.9rem 1.1rem;
      }
      .table tbody tr {
        border-bottom: 1px solid #f3f3f2;
        transition:
          background-color 0.15s ease,
          transform 0.15s ease;
      }
      .table tbody tr:last-child {
        border-bottom: none;
      }
      .table tbody tr:hover {
        background: linear-gradient(90deg, #fffbf0 0%, #fff8ee 100%);
        transform: translateX(3px);
      }
      .table td {
        padding: 0.9rem 1.1rem;
        vertical-align: middle;
        border: none;
      }
      /* Reserve modal */
      .modal-header {
        background: linear-gradient(90deg, var(--red-dark) 0%, var(--red) 100%);
        color: #fff;
        border-bottom: none;
      }
      .modal-title {
        font-weight: 700;
        font-size: 1rem;
      }
      .btn-close {
        filter: invert(1);
      }
      .btn-confirm {
        background: linear-gradient(
          135deg,
          var(--red) 0%,
          var(--red-dark) 100%
        );
        border: none;
        color: #fff;
        font-weight: 700;
        border-radius: 7px;
        padding: 0.45rem 1.2rem;
        transition: all 0.2s ease;
        box-shadow: 0 3px 10px rgba(185, 28, 28, 0.28);
      }
      .btn-confirm:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(185, 28, 28, 0.4);
        color: #fff;
      }
    </style>
  </head>
  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-md navbar-student sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">
          <i
            class="bi bi-mortarboard-fill me-1"
            style="color: var(--gold-light)"
          ></i
          >UniLend
        </a>
        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#studentNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="studentNav">
          <ul class="navbar-nav ms-auto align-items-center gap-2">
            <li class="nav-item">
              <span class="nav-link nav-label" id="userGreeting">
                <i class="bi bi-person-circle me-1"></i>Student
              </span>
            </li>
            <li class="nav-item">
              <button class="btn-logout" id="logoutBtn">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="gold-bar"></div>

    <main class="container py-4 py-md-5">
      <!-- Available Equipment -->
      <section id="equipmentSection" class="mb-5">
        <div class="section-heading mb-1">
          <div class="heading-icon"><i class="bi bi-box-seam"></i></div>
          Available Equipment
        </div>
        <p class="text-muted small mb-3" style="padding-left: 3rem">
          Browse and reserve items for your events and classes.
        </p>
        <div class="row g-3" id="equipmentGrid"></div>
      </section>

      <!-- My Requests -->
      <section id="requestsSection">
        <div class="section-heading mb-1">
          <div class="heading-icon"><i class="bi bi-card-checklist"></i></div>
          My Requests
        </div>
        <p class="text-muted small mb-3" style="padding-left: 3rem">
          Track the status of your equipment reservations.
        </p>
        <div class="panel-card">
          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th>Item</th>
                  <th>Date</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="requestsTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <!-- Reserve Modal -->
    <div
      class="modal fade"
      id="reserveModal"
      tabindex="-1"
      aria-labelledby="reserveModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="reserveModalLabel">
              Reserve Equipment
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p class="mb-2">Item: <strong id="modalItemName"></strong></p>
            <input type="hidden" id="modalItemId" />
            <div class="mb-3">
              <label
                for="reserveDate"
                class="form-label fw-semibold"
                style="font-size: 0.83rem"
                >Reservation Date</label
              >
              <input
                type="date"
                class="form-control"
                id="reserveDate"
                required
              />
            </div>
          </div>
          <div class="modal-footer border-0">
            <button
              type="button"
              class="btn btn-outline-secondary btn-sm"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="button" class="btn-confirm" id="confirmReserveBtn">
              <i class="bi bi-check-circle me-1"></i>Confirm
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
