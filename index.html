<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniLend &mdash; Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --red: #b91c1c;
        --red-dark: #7f1d1d;
        --gold: #d97706;
        --gold-light: #f59e0b;
        --gold-pale: #fef3c7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: linear-gradient(
          135deg,
          #3b0f0f 0%,
          #8b1e1e 45%,
          #5c1616 100%
        );
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse at 15% 15%,
            rgba(245, 158, 11, 0.18) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 85% 85%,
            rgba(217, 119, 6, 0.12) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 50% 100%,
            rgba(0, 0, 0, 0.25) 0%,
            transparent 60%
          );
        pointer-events: none;
      }

      /* Decorative circles */
      body::after {
        content: "";
        position: fixed;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        border: 1px solid rgba(245, 158, 11, 0.08);
        top: -200px;
        right: -200px;
        pointer-events: none;
      }

      .deco-ring {
        position: fixed;
        border-radius: 50%;
        border: 1px solid rgba(245, 158, 11, 0.06);
        pointer-events: none;
      }
      .deco-ring-1 {
        width: 400px;
        height: 400px;
        bottom: -120px;
        left: -120px;
      }
      .deco-ring-2 {
        width: 250px;
        height: 250px;
        top: 20%;
        left: 60%;
        border-color: rgba(185, 28, 28, 0.08);
      }

      .login-wrapper {
        max-width: 460px;
        width: 100%;
        padding: 0 1.25rem;
        position: relative;
        z-index: 1;
      }

      .login-card {
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 20px;
        box-shadow:
          0 32px 64px rgba(127, 29, 29, 0.35),
          0 0 0 1px rgba(245, 158, 11, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        animation: cardIn 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(28px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* Brand */
      .brand-logo-img {
        width: 96px;
        height: 96px;
        object-fit: contain;
        margin-bottom: 1rem;
        animation: iconPop 0.6s 0.15s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        filter: drop-shadow(0 4px 14px rgba(127, 29, 29, 0.28));
      }

      @keyframes iconPop {
        from {
          transform: scale(0.6);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .brand-name {
        font-size: 2rem;
        font-weight: 900;
        letter-spacing: -0.8px;
        background: linear-gradient(
          135deg,
          var(--red-dark) 20%,
          var(--red) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
      }

      .brand-divider {
        width: 44px;
        height: 3px;
        background: linear-gradient(90deg, var(--gold), var(--gold-light));
        border-radius: 2px;
        margin: 0.65rem auto 0.6rem;
      }

      .brand-subtitle {
        font-size: 0.8rem;
        color: #6b7280;
        letter-spacing: 0.3px;
      }

      /* Role pills */
      .role-pills {
        background: #f9fafb;
        border-radius: 0.75rem;
        padding: 0.3rem;
        gap: 0.3rem;
        border: 1px solid #f3f4f6;
      }

      .role-pills .nav-link {
        border-radius: 0.6rem;
        font-weight: 600;
        font-size: 0.875rem;
        color: #6b7280;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        border: none;
        padding: 0.55rem 1rem;
        position: relative;
      }

      .role-pills .nav-link:hover:not(.active) {
        color: var(--gold);
        background: var(--gold-pale);
      }

      .role-pills .nav-link.active {
        background: linear-gradient(
          135deg,
          var(--red) 0%,
          var(--red-dark) 100%
        );
        color: #fff;
        box-shadow: 0 4px 14px rgba(185, 28, 28, 0.32);
      }

      .role-pills .nav-link.active i {
        color: var(--gold-light);
      }

      /* Form */
      .form-label {
        font-weight: 600;
        font-size: 0.8rem;
        color: #374151;
        letter-spacing: 0.2px;
        text-transform: uppercase;
      }

      .input-group-text {
        background: var(--gold-pale);
        border-color: #e5e7eb;
        color: var(--gold);
        transition: all 0.2s ease;
        width: 44px;
        justify-content: center;
      }

      .form-control {
        border-color: #e5e7eb;
        font-size: 0.9rem;
        padding: 0.6rem 0.85rem;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .form-control:focus {
        border-color: var(--gold-light);
        box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.14);
      }

      .input-group:focus-within .input-group-text {
        border-color: var(--gold-light);
        background: #fffbeb;
        color: var(--gold);
      }

      .form-control::placeholder {
        color: #c5c8ce;
        font-size: 0.85rem;
      }

      /* Password toggle */
      .btn-pass-toggle {
        background: transparent;
        border: 1px solid #e5e7eb;
        border-left: 0;
        color: #9ca3af;
        transition: all 0.2s ease;
        padding: 0 0.75rem;
      }
      .btn-pass-toggle:hover {
        color: var(--gold);
        background: #fffbeb;
      }
      .input-group:focus-within .btn-pass-toggle {
        border-color: var(--gold-light);
      }

      /* Login button */
      .btn-login {
        background: linear-gradient(
          135deg,
          var(--red) 0%,
          var(--red-dark) 100%
        );
        border: none;
        color: #fff;
        font-weight: 700;
        font-size: 0.95rem;
        letter-spacing: 0.25px;
        padding: 0.75rem;
        border-radius: 0.7rem;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }

      .btn-login::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(245, 158, 11, 0.22) 0%,
          transparent 55%
        );
        opacity: 0;
        transition: opacity 0.25s ease;
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 28px rgba(185, 28, 28, 0.45);
        color: #fff;
      }

      .btn-login:hover::after {
        opacity: 1;
      }

      .btn-login:active {
        transform: translateY(0);
        box-shadow: 0 4px 10px rgba(185, 28, 28, 0.3);
      }

      .btn-login:disabled {
        opacity: 0.7;
        transform: none;
        cursor: not-allowed;
      }

      /* Register button */
      .btn-register {
        background: linear-gradient(
          135deg,
          var(--gold) 0%,
          var(--gold-light) 100%
        );
        border: none;
        color: #fff;
        font-weight: 700;
        font-size: 0.95rem;
        letter-spacing: 0.25px;
        padding: 0.75rem;
        border-radius: 0.7rem;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .btn-register:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 28px rgba(217, 119, 6, 0.42);
        color: #fff;
      }

      .btn-register:active {
        transform: translateY(0);
      }

      .btn-register:disabled {
        opacity: 0.7;
        transform: none;
        cursor: not-allowed;
      }

      .toggle-link {
        font-size: 0.845rem;
        color: #6b7280;
      }

      .toggle-link a {
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s ease;
      }

      #showRegisterLink {
        color: var(--gold);
      }
      #showRegisterLink:hover {
        color: var(--gold-light);
      }
      #showLoginLink {
        color: var(--red);
      }
      #showLoginLink:hover {
        color: var(--red-dark);
      }

      /* Divider */
      .form-divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: 1.25rem 0;
        font-size: 0.75rem;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .form-divider::before,
      .form-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e5e7eb;
      }

      /* Footer */
      .footer-text {
        color: rgba(255, 255, 255, 0.65);
        font-size: 0.75rem;
        text-align: center;
        margin-top: 1.5rem;
        letter-spacing: 0.2px;
      }

      /* Alert */
      .alert-danger {
        font-size: 0.84rem;
        border-radius: 0.65rem;
        border-left: 3px solid #ef4444;
        background: #fef2f2;
      }
      .alert-success {
        border-radius: 0.65rem;
        border-left: 3px solid #10b981;
        font-size: 0.84rem;
      }

      /* Responsive */
      @media (max-width: 480px) {
        .login-card {
          border-radius: 1.25rem;
        }
        .brand-name {
          font-size: 1.7rem;
        }
        .brand-logo-img {
          width: 76px;
          height: 76px;
        }
      }
    </style>
  </head>
  <body>
    <div class="deco-ring deco-ring-1"></div>
    <div class="deco-ring deco-ring-2"></div>
    <div class="login-wrapper">
      <div class="login-card p-4 p-md-5">
        <!-- Brand -->
        <div class="text-center mb-4">
          <img
            src="assets/usa-logo.png"
            alt="University of San Agustin"
            class="brand-logo-img"
          />
          <div class="brand-name">UniLend</div>
          <div class="brand-divider"></div>
          <p class="brand-subtitle mt-2 mb-0">
            University Equipment Reservation
          </p>
        </div>

        <!-- Role Toggle -->
        <ul
          class="nav nav-pills nav-justified role-pills mb-4"
          id="roleTab"
          role="tablist"
        >
          <li class="nav-item" role="presentation">
            <button
              class="nav-link active w-100"
              id="student-tab"
              data-bs-toggle="pill"
              type="button"
              role="tab"
              aria-selected="true"
            >
              <i class="bi bi-person me-1"></i>Student
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button
              class="nav-link w-100"
              id="admin-tab"
              data-bs-toggle="pill"
              type="button"
              role="tab"
              aria-selected="false"
            >
              <i class="bi bi-shield-lock me-1"></i>Admin
            </button>
          </li>
        </ul>

        <!-- Login Form -->
        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <div class="input-group">
              <span class="input-group-text"
                ><i class="bi bi-envelope"></i
              ></span>
              <input
                type="email"
                class="form-control"
                id="email"
                placeholder="you@usa.edu.ph"
                required
                autocomplete="email"
              />
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Enter your password"
                required
                autocomplete="current-password"
              />
              <button
                class="btn-pass-toggle"
                type="button"
                id="togglePass"
                tabindex="-1"
                aria-label="Toggle password visibility"
              >
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-login w-100" id="loginBtn">
            <i class="bi bi-box-arrow-in-right me-2"></i>Log In
          </button>
        </form>

        <div
          id="loginError"
          class="alert alert-danger mt-3 d-none py-2"
          role="alert"
        ></div>

        <!-- Toggle: show register (only visible on Student tab) -->
        <p class="toggle-link text-center mt-3 mb-0" id="registerToggleWrap">
          Don't have an account?
          <a href="#" id="showRegisterLink">Sign up</a>
        </p>

        <!-- Register Form (hidden by default) -->
        <form id="registerForm" class="d-none" novalidate>
          <div class="form-divider">Create your account</div>

          <div class="mb-3">
            <label for="regName" class="form-label">Full Name</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input
                type="text"
                class="form-control"
                id="regName"
                placeholder="Your full name"
                autocomplete="name"
              />
            </div>
          </div>

          <div class="mb-3">
            <label for="regEmail" class="form-label">Email address</label>
            <div class="input-group">
              <span class="input-group-text"
                ><i class="bi bi-envelope"></i
              ></span>
              <input
                type="email"
                class="form-control"
                id="regEmail"
                placeholder="you@usa.edu.ph"
                required
                autocomplete="email"
              />
            </div>
          </div>

          <div class="mb-3">
            <label for="regPassword" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                type="password"
                class="form-control"
                id="regPassword"
                placeholder="At least 6 characters"
                required
                autocomplete="new-password"
              />
            </div>
          </div>

          <div class="mb-4">
            <label for="regConfirm" class="form-label">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text"
                ><i class="bi bi-lock-fill"></i
              ></span>
              <input
                type="password"
                class="form-control"
                id="regConfirm"
                placeholder="Repeat your password"
                required
                autocomplete="new-password"
              />
            </div>
          </div>

          <button type="submit" class="btn btn-register w-100" id="registerBtn">
            <i class="bi bi-person-plus me-2"></i>Create Account
          </button>
        </form>

        <div
          id="registerSuccess"
          class="alert alert-success mt-3 d-none py-2"
          role="alert"
        ></div>
        <div
          id="registerError"
          class="alert alert-danger mt-3 d-none py-2"
          role="alert"
        ></div>

        <!-- Toggle: back to login (shown when register form is open) -->
        <p
          class="toggle-link text-center mt-3 mb-0 d-none"
          id="loginToggleWrap"
        >
          Already have an account?
          <a href="#" id="showLoginLink">Log in</a>
        </p>
      </div>

      <p class="footer-text">
        &copy; 2026 UniLend &middot; All rights reserved.
      </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
