<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniLend &mdash; Admin Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --red: #b91c1c;
        --red-dark: #7f1d1d;
        --gold: #d97706;
        --gold-light: #f59e0b;
        --gold-pale: #fef3c7;
        --bg: #faf7f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg);
        color: #1f2937;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 0.9375rem;
      }

      /* ---- Navbar ---- */
      .navbar-admin {
        background: linear-gradient(
          90deg,
          var(--red-dark) 0%,
          #9b1c1c 60%,
          #92400e 100%
        );
        box-shadow: 0 2px 16px rgba(127, 29, 29, 0.4);
        padding: 0.65rem 0;
      }

      .navbar-brand {
        font-size: 1.2rem;
        font-weight: 800;
        color: var(--gold-light) !important;
        letter-spacing: -0.3px;
        display: flex;
        align-items: center;
        gap: 0.45rem;
      }

      .badge-admin {
        background: rgba(245, 158, 11, 0.18);
        color: var(--gold-light);
        border: 1px solid rgba(245, 158, 11, 0.35);
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.8px;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
      }

      .nav-label {
        color: rgba(255, 255, 255, 0.6) !important;
        font-size: 0.85rem;
      }

      .btn-logout {
        border: 1.5px solid rgba(245, 158, 11, 0.45);
        color: var(--gold-light);
        font-size: 0.8rem;
        font-weight: 600;
        border-radius: 7px;
        padding: 0.35rem 0.9rem;
        background: transparent;
        transition: all 0.2s ease;
      }

      .btn-logout:hover {
        background: rgba(245, 158, 11, 0.15);
        border-color: var(--gold-light);
        color: var(--gold-light);
      }

      /* Gold stripe under navbar */
      .gold-bar {
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--gold) 0%,
          var(--gold-light) 40%,
          rgba(245, 158, 11, 0.2) 100%
        );
      }

      /* ---- Page animation ---- */
      main {
        animation: pageIn 0.4s ease both;
      }

      @keyframes pageIn {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ---- Section heading ---- */
      .section-heading {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--red-dark);
      }

      .heading-icon {
        width: 38px;
        height: 38px;
        border-radius: 9px;
        background: linear-gradient(
          135deg,
          var(--red) 0%,
          var(--red-dark) 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--gold-light);
        font-size: 1rem;
        flex-shrink: 0;
        box-shadow: 0 4px 10px rgba(185, 28, 28, 0.28);
      }

      /* ---- Panel card ---- */
      .panel-card {
        background: #fff;
        border: 1px solid rgba(0, 0, 0, 0.055);
        border-radius: 1rem;
        box-shadow: 0 2px 14px rgba(0, 0, 0, 0.055);
        overflow: hidden;
        transition: box-shadow 0.25s ease;
      }

      .panel-card:hover {
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.09);
      }

      /* ---- Tables ---- */
      .table {
        margin-bottom: 0;
        font-size: 0.875rem;
      }

      .table thead th {
        background: linear-gradient(90deg, var(--red-dark) 0%, var(--red) 100%);
        color: rgba(255, 255, 255, 0.88);
        font-weight: 600;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        border: none;
        padding: 0.9rem 1.1rem;
      }

      .table tbody tr {
        border-bottom: 1px solid #f3f3f2;
        transition:
          background-color 0.15s ease,
          transform 0.15s ease;
      }

      .table tbody tr:last-child {
        border-bottom: none;
      }

      .table tbody tr:hover {
        background: linear-gradient(90deg, #fffbf0 0%, #fff8ee 100%);
        transform: translateX(3px);
      }

      .table td {
        padding: 0.9rem 1.1rem;
        vertical-align: middle;
        color: #374151;
        border: none;
      }

      /* ---- Buttons ---- */
      .btn-approve {
        background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
        border: none;
        color: #fff;
        font-size: 0.77rem;
        font-weight: 700;
        padding: 0.38rem 0.85rem;
        border-radius: 6px;
        transition: all 0.2s ease;
        box-shadow: 0 2px 7px rgba(180, 83, 9, 0.28);
        letter-spacing: 0.2px;
      }

      .btn-approve:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 14px rgba(180, 83, 9, 0.4);
        color: #fff;
        filter: brightness(1.07);
      }

      .btn-approve:active {
        transform: translateY(0);
      }

      .btn-deny {
        background: linear-gradient(
          135deg,
          var(--red) 0%,
          var(--red-dark) 100%
        );
        border: none;
        color: #fff;
        font-size: 0.77rem;
        font-weight: 700;
        padding: 0.38rem 0.85rem;
        border-radius: 6px;
        transition: all 0.2s ease;
        box-shadow: 0 2px 7px rgba(185, 28, 28, 0.28);
        letter-spacing: 0.2px;
      }

      .btn-deny:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 14px rgba(185, 28, 28, 0.4);
        color: #fff;
        filter: brightness(1.07);
      }

      .btn-deny:active {
        transform: translateY(0);
      }

      /* ---- Status badges ---- */
      .badge-instock {
        background: #d1fae5;
        color: #065f46;
        font-size: 0.73rem;
        font-weight: 600;
        padding: 0.3rem 0.7rem;
        border-radius: 99px;
        letter-spacing: 0.2px;
      }

      .badge-low {
        background: var(--gold-pale);
        color: #92400e;
        font-size: 0.73rem;
        font-weight: 600;
        padding: 0.3rem 0.7rem;
        border-radius: 99px;
        letter-spacing: 0.2px;
      }

      .badge-out {
        background: #fee2e2;
        color: #991b1b;
        font-size: 0.73rem;
        font-weight: 600;
        padding: 0.3rem 0.7rem;
        border-radius: 99px;
        letter-spacing: 0.2px;
      }

      /* ---- Item icon color ---- */
      .item-icon {
        color: var(--red);
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-md navbar-admin sticky-top">
      <div class="container">
        <a class="navbar-brand" href="#">
          <i
            class="bi bi-mortarboard-fill"
            style="color: var(--gold-light)"
          ></i>
          UniLend
          <span class="badge-admin">ADMIN</span>
        </a>
        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#adminNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNav">
          <ul class="navbar-nav ms-auto align-items-center gap-2">
            <li class="nav-item">
              <span class="nav-link nav-label">
                <i class="bi bi-shield-check me-1"></i>Administrator
              </span>
            </li>
            <li class="nav-item">
              <button class="btn-logout" id="logoutBtn">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="gold-bar"></div>

    <main class="container py-4 py-md-5">
      <!-- Pending Requests -->
      <section id="pendingSection" class="mb-5">
        <div class="section-heading mb-1">
          <div class="heading-icon"><i class="bi bi-hourglass-split"></i></div>
          Pending Requests
        </div>
        <p class="text-muted small mb-3" style="padding-left: 3rem">
          Review and manage student reservation requests.
        </p>
        <div class="panel-card">
          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th>Student</th>
                  <th>Item</th>
                  <th>Date</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="pendingTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Inventory -->
      <section id="inventorySection">
        <div class="section-heading mb-1">
          <div class="heading-icon"><i class="bi bi-clipboard-data"></i></div>
          Inventory
        </div>
        <p class="text-muted small mb-3" style="padding-left: 3rem">
          Current stock levels for all equipment.
        </p>
        <div class="panel-card">
          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th>Item Name</th>
                  <th class="text-center">Total Stock</th>
                  <th class="text-center">Available</th>
                  <th class="text-center">Status</th>
                </tr>
              </thead>
              <tbody id="inventoryTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
